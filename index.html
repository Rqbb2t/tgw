<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동방성배록 위키피디아</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-char: #f87171;
            --accent-item: #fbbf24;
            --accent-aug: #c084fc;
            --default-icon: #38bdf8;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        .header { text-align: center; margin-bottom: 40px; }
        
        .lobby-container {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 25px; width: 90%; max-width: 1000px;
        }

        .wiki-card {
            background: var(--card-bg); border-radius: 20px;
            padding: 40px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05);
            text-decoration: none; color: inherit; /* 링크 스타일 제거 */
        }

        .wiki-card i { 
            font-size: 4rem; margin-bottom: 25px; 
            color: var(--default-icon); 
            transition: color 0.3s ease; 
        }

        /* 각 카드별 호버링 색상 변경 */
        .char-card:hover { transform: translateY(-10px); border-color: var(--accent-char); }
        .char-card:hover i { color: var(--accent-char); }
        .item-card:hover { transform: translateY(-10px); border-color: var(--accent-item); }
        .item-card:hover i { color: var(--accent-item); }
        .aug-card:hover { transform: translateY(-10px); border-color: var(--accent-aug); }
        .aug-card:hover i { color: var(--accent-aug); }

        .char-card.locked {
            filter: grayscale(1); /* 회색조 처리 */
            opacity: 0.6;        /* 투명하게 */
            cursor: not-allowed; /* 금지 마우스 커서 */
        }

        /* 하단 업데이트 패널 */
        .update-trigger {
            position: fixed; bottom: 0; left: 0; width: 100%;
            height: 40px; background: rgba(15, 23, 42, 0.95);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-top: 2px solid var(--default-icon);
            z-index: 100;
        }

        .update-panel {
            position: fixed; bottom: -280px;
            left: 0; width: 100%; height: 260px;
            background: #1e293b; transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 101; padding: 30px; box-sizing: border-box;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }

        .update-trigger:hover + .update-panel, .update-panel:hover {
            bottom: 0;
        }

        .update-content { max-width: 800px; margin: 0 auto; }
        .update-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .tag { 
            background: var(--default-icon); color: #000; font-weight: bold;
            padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 12px; 
        }
        .update-date { color: #64748b; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .lobby-container { grid-template-columns: 1fr; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>동방성배록 위키피디아</h1>
        <p>최신 패치와 데이터를 확인하세요.</p>
    </div>

    <div class="lobby-container">
        <div class="wiki-card char-card locked" onclick="navigateTo('character.html',true)">
            <i class="fas fa-users"></i>
            <h2>캐릭터 위키</h2>
        </div>

        <div class="wiki-card item-card" onclick="navigateTo('item.html')">
            <i class="fas fa-box-open"></i>
            <h2>아이템 위키</h2>
        </div>

        <div class="wiki-card aug-card" onclick="navigateTo('augment.html')">
            <i class="fas fa-wand-magic-sparkles"></i>
            <h2>증강 위키</h2>
        </div>
    </div>

    <div class="update-trigger">
        <span><i class="fas fa-chevron-up"></i> 최근 업데이트 내역</span>
    </div>

    <div class="update-panel">
        <div class="update-content">
            <h3 style="margin-top:0;"><i class="fas fa-history"></i> Patch Notes</h3>
            <div id="updateList">
                </div>
        </div>
    </div>

    <script>
        // 1. 업데이트 텍스트 데이터 변수
        //{ tag: "SYSTEM", text: "로비 이동 경로 및 데이터 렌더링 함수 최적화", date: "2026.04.02" }
        const updateData = [
        ];

        /**
         * 2. 업데이트 내역 제어 함수
         */
        function renderUpdates() {
            const listContainer = document.getElementById('updateList');
            
            // 데이터가 없을 경우 처리
            if (updateData.length === 0) {
                listContainer.innerHTML = `
                    <div class="update-item" style="justify-content: center; color: #64748b; border: none; padding: 40px 0;">
                        이곳에 업데이트 내역이 출력됩니다.
                    </div>
                `;
                return;
            }

            // 데이터가 있을 경우 렌더링
            listContainer.innerHTML = updateData.map(item => `
                <div class="update-item">
                    <span><span class="tag">${item.tag}</span>${item.text}</span>
                    <span class="update-date">${item.date}</span>
                </div>
            `).join('');
        }
        /**
         * 3. 페이지 이동 함수
         */
        function navigateTo(url, isLocked = false) {
            if (isLocked) {
                alert("해당 기능은 현재 준비 중입니다. 이용에 불편을 드려 죄송합니다.");
                return; // 함수 종료 (이동하지 않음)
            }
            
            console.log(`Navigating to: ${url}`);
            window.location.href = url;
        }

        // 페이지 로드 시 업데이트 내역 출력
        window.onload = renderUpdates;
    </script>
</body>
</html>
