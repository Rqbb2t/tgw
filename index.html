<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동방성배록 위키피디아</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-char: #f87171;
            --accent-item: #fbbf24;
            --accent-aug: #c084fc;
            --default-icon: #38bdf8;
            --online-color: #10b981;
            --offline-color: #ef4444;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        /* 서버 상태 및 컨트롤 컨테이너 */
        .server-status-container {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            display: flex; flex-direction: column; gap: 12px; align-items: flex-end;
        }

        .server-status-popup {
            background: var(--card-bg); padding: 12px 18px; border-radius: 12px;
            display: flex; align-items: center; gap: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; position: relative; background-color: #64748b; }
        .status-online { background-color: var(--online-color); box-shadow: 0 0 8px var(--online-color); }
        .status-offline { background-color: var(--offline-color); box-shadow: 0 0 8px var(--offline-color); }
        .status-dot::after { content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%; background: inherit; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2.5); opacity: 0; } }

        .status-text { font-weight: 700; font-size: 0.8rem; }
        #serverIp { color: #64748b; font-size: 0.7rem; display: block; }

        /* 컨트롤 패널 (스위치 + 볼륨) */
        .control-panel {
            background: rgba(30, 41, 59, 0.8);
            padding: 10px 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; font-size: 0.75rem; color: #94a3b8; }

        /* 스위치 스타일 */
        .switch { position: relative; display: inline-block; width: 30px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .3s; border-radius: 16px; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--default-icon); }
        input:checked + .slider:before { transform: translateX(14px); }

        /* 볼륨 슬라이더 스타일 */
        .volume-container { display: flex; align-items: center; gap: 8px; }
        input[type="range"] {
            -webkit-appearance: none; width: 80px; height: 4px;
            background: #334155; border-radius: 2px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 12px; height: 12px;
            background: var(--default-icon); border-radius: 50%; cursor: pointer;
        }

        /* 중앙 알림 모달 */
        #centralModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: #1e293b; border: 2px solid var(--default-icon);
            padding: 30px 50px; border-radius: 24px; text-align: center;
            z-index: 2000; display: none; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #centralModal.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }
        #centralModal h2 { margin: 0 0 10px 0; color: var(--default-icon); }
        .close-btn { margin-top: 20px; background: var(--default-icon); color: #000; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* 기본 레이아웃 */
        .header { text-align: center; margin-bottom: 40px; }
        .lobby-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 90%; max-width: 1000px; }
        .wiki-card { background: var(--card-bg); border-radius: 20px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05); text-decoration: none; color: inherit; }
        .wiki-card i { font-size: 4rem; margin-bottom: 25px; color: var(--default-icon); transition: color 0.3s ease; }
        .char-card:hover { transform: translateY(-10px); border-color: var(--accent-char); }
        .item-card:hover { transform: translateY(-10px); border-color: var(--accent-item); }
        .aug-card:hover { transform: translateY(-10px); border-color: var(--accent-aug); }
        .char-card.locked { filter: grayscale(1); opacity: 0.6; cursor: not-allowed; }

        .update-trigger { position: fixed; bottom: 0; left: 0; width: 100%; height: 40px; background: rgba(15, 23, 42, 0.95); display: flex; align-items: center; justify-content: center; cursor: pointer; border-top: 2px solid var(--default-icon); z-index: 100; }
        .update-panel { position: fixed; bottom: -280px; left: 0; width: 100%; height: 260px; background: #1e293b; transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); z-index: 101; padding: 30px; box-sizing: border-box; box-shadow: 0 -10px 40px rgba(0,0,0,0.6); }
        .update-trigger:hover + .update-panel, .update-panel:hover { bottom: 0; }
        .update-content { max-width: 800px; margin: 0 auto; }
        .update-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tag { background: var(--default-icon); color: #000; font-weight: bold; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 12px; }
        .update-date { color: #64748b; font-size: 0.85rem; }

        @media (max-width: 768px) { .lobby-container { grid-template-columns: 1fr; } body { overflow-y: auto; } }
    </style>
</head>
<body>

    <div class="server-status-container">
        <div class="server-status-popup">
            <div id="statusDot" class="status-dot"></div>
            <div>
                <div class="status-text" id="statusText">CHECKING...</div>
                <span id="serverIp">helpgames.kro.kr</span>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-row">
                <span>상태 알림 모드</span>
                <label class="switch">
                    <input type="checkbox" id="alertToggle" onchange="toggleAlert(this)">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="control-row">
                <div class="volume-container">
                    <i class="fas fa-volume-low" id="volIcon"></i>
                    <input type="range" id="volControl" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
                </div>
                <span id="volPercent">50%</span>
            </div>
        </div>
    </div>

    <div id="centralModal">
        <h2 id="modalTitle">서버 상태 변경!</h2>
        <p id="modalDesc">서버가 현재 온라인 상태입니다.</p>
        <button class="close-btn" onclick="closeModal()">확인</button>
    </div>

    <div class="header">
        <h1>동방성배록 위키피디아</h1>
        <p>최신 패치와 데이터를 확인하세요.</p>
    </div>

    <div class="lobby-container">
        <div class="wiki-card char-card locked" onclick="navigateTo('character.html',true)">
            <i class="fas fa-users"></i>
            <h2>캐릭터 위키</h2>
        </div>
        <div class="wiki-card item-card" onclick="navigateTo('item.html')">
            <i class="fas fa-box-open"></i>
            <h2>아이템 위키</h2>
        </div>
        <div class="wiki-card aug-card" onclick="navigateTo('augment.html')">
            <i class="fas fa-wand-magic-sparkles"></i>
            <h2>증강 위키</h2>
        </div>
    </div>

    <div class="update-trigger">
        <span><i class="fas fa-chevron-up"></i> 최근 업데이트 내역</span>
    </div>

    <div class="update-panel">
        <div class="update-content">
            <h3 style="margin-top:0;"><i class="fas fa-history"></i> Patch Notes</h3>
            <div id="updateList"></div>
        </div>
    </div>

    <script>
        let lastStatus = null;
        let alertEnabled = false;
        const alertAudio = new Audio('audio.mp3');

        // 볼륨 조절 함수
        function changeVolume(val) {
            alertAudio.volume = val;
            document.getElementById('volPercent').innerText = Math.round(val * 100) + "%";
            
            // 아이콘 변경
            const volIcon = document.getElementById('volIcon');
            if (val == 0) volIcon.className = "fas fa-volume-mute";
            else if (val < 0.5) volIcon.className = "fas fa-volume-low";
            else volIcon.className = "fas fa-volume-high";

            // 설정 저장
            localStorage.setItem('wiki_volume', val);
        }

        // 초기 볼륨 설정 불러오기
        function initVolume() {
            const savedVol = localStorage.getItem('wiki_volume');
            if (savedVol !== null) {
                document.getElementById('volControl').value = savedVol;
                changeVolume(savedVol);
            }
        }

        function toggleAlert(checkbox) {
            alertEnabled = checkbox.checked;
            if (alertEnabled) {
                if (Notification.permission !== "granted") {
                    Notification.requestPermission();
                }
                playMp3(); // 테스트 재생
            }
        }

        function playMp3() {
            if (!alertEnabled) return;
            alertAudio.currentTime = 0;
            alertAudio.play().catch(e => console.warn("Audio play blocked"));
        }

        function showModal(isOnline) {
            const modal = document.getElementById('centralModal');
            document.getElementById('modalTitle').innerText = isOnline ? "🟢 SERVER ONLINE" : "🔴 SERVER OFFLINE";
            document.getElementById('modalTitle').style.color = isOnline ? "var(--online-color)" : "var(--offline-color)";
            document.getElementById('modalDesc').innerText = isOnline ? "서버가 열렸습니다! 지금 접속 가능합니다." : "서버가 닫혔습니다. 점검 중일 수 있습니다.";
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('centralModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function sendNotification(isOnline) {
            if (Notification.permission === "granted" && alertEnabled) {
                new Notification("동방성배록 서버 상태", {
                    body: isOnline ? "🟢 서버가 온라인 상태가 되었습니다!" : "🔴 서버가 오프라인 상태가 되었습니다.",
                    icon: "icon.png"
                });
            }
        }

        async function checkServerStatus() {
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const apiUrl = 'https://api.mcsrvstat.us/3/helpgames.kro.kr';

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                const currentStatus = data.online;

                if (currentStatus) {
                    statusDot.className = 'status-dot status-online';
                    statusText.innerText = 'SERVER ONLINE';
                    statusText.style.color = 'var(--online-color)';
                } else {
                    statusDot.className = 'status-dot status-offline';
                    statusText.innerText = 'SERVER OFFLINE';
                    statusText.style.color = 'var(--offline-color)';
                }

                if (lastStatus !== null && lastStatus !== currentStatus) {
                    if (alertEnabled) {
                        playMp3();
                        showModal(currentStatus);
                        sendNotification(currentStatus);
                    }
                }
                lastStatus = currentStatus;
            } catch (error) { console.error("Status Check Error"); }
        }

        const updateData = [
            { tag: "LOBBY", text: "서버 온 오프 감지 기능 추가", date: "2026.04.06" }
        ];

        function renderUpdates() {
            const listContainer = document.getElementById('updateList');
            if (updateData.length === 0) return;
            listContainer.innerHTML = updateData.map(item => `
                <div class="update-item">
                    <span><span class="tag">${item.tag}</span>${item.text}</span>
                    <span class="update-date">${item.date}</span>
                </div>
            `).join('');
        }

        function navigateTo(url, isLocked = false) {
            if (isLocked) { alert("해당 기능은 현재 준비 중입니다."); return; }
            window.location.href = url;
        }

        window.onload = () => {
            renderUpdates();
            initVolume(); // 볼륨 초기화
            checkServerStatus();
            setInterval(checkServerStatus, 30000); 
        };
    </script>
</body>
</html>
